---

- name: Install requirements
  tags: install
  ansible.builtin.package:
    name: software-properties-common

- name: Add xbmc repository
  tags: install
  ansible.builtin.apt_repository:
    repo: ppa:team-xbmc/ppa

- name: Install Kodi
  tags: install
  ansible.builtin.apt:
    name: kodi
    update_cache: yes
    cache_valid_time: 1800
