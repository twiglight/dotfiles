---

- name: Install emacs
  tags: install
  ansible.builtin.package:
    name: emacs
    state: latest
  become: yes
  become_user: root
  become_method: sudo

- name: create config folder
  tags: config
  ansible.builtin.file:
    path: "{{ user_home }}/.emacs.d"
    state: directory

- name: Set init.el
  tags: config
  ansible.builtin.copy:
    src: '{{ inventory_dir }}/../emacs/init.el'
    dest: "{{ user_home }}/.emacs.d/init.el"

- name: Set init-use-package.el
  tags: config
  ansible.builtin.copy:
    src: '{{ inventory_dir }}/../emacs/init-use-package.el'
    dest: "{{ user_home }}/.emacs.d/init-use-package.el"
