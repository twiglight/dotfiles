---

- name: Install VIM (fedora)
  tags: install
  ansible.builtin.package:
    name: vim
    state: latest
  become: yes
  become_user: root
  become_method: sudo

- name: Set vimrc
  tags: config
  ansible.builtin.file:
    src: '{{ inventory_dir }}/../vim/vimrc'
    dest: "{{ lookup('env', 'HOME') }}/.vimrc"
    state: link
    force: yes

- name: Set VIM as default editor in .bashrc
  tags:
    - config
    - bashrc
  ansible.builtin.lineinfile:
    path: "{{ lookup('env', 'HOME') }}/.bashrc"
    line: 'export EDITOR=vim'
    state: present
