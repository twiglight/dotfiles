---

- name: Install asdf (fedora)
  tags: install
  git:
    repo: "https://github.com/asdf-vm/asdf.git"
    dest: "{{ user_home }}/.asdf"
    version: v0.9.0

- name: Add asdf to .bashrc
  tags:
    - config
    - bashrc
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.bashrc"
    line: '. $HOME/.asdf/asdf.sh'
    state: present

- name: Create plugins folder
  tags: config
  ansible.builtin.file:
    path: "{{ user_home }}/.asdf/plugins"
    state: directory
