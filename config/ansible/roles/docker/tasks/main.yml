---

- name: Install requirements
  tags: install
  become: yes
  become_user: root
  become_method: sudo
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release

- name: Ensure apt keyrings is present
  tags: install
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory

- name: Add Docker GPG key
  tags: install
  become: yes
  become_user: root
  become_method: sudo
  ansible.builtin.shell:
    cmd: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  tags: install
  become: yes
  become_user: root
  become_method: sudo
  ansible.builtin.shell:
    cmd: echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
    creates: /etc/apt/sources.list.d/docker.list

- name: Update apt
  tags: install
  become: yes
  become_user: root
  become_method: sudo
  ansible.builtin.apt:
    update_cache: yes

- name: Install Docker from repository
  tags: install
  become: yes
  become_user: root
  become_method: sudo
  ansible.builtin.package:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin

- name: Add user to docker group
  tags: config
  become: yes
  become_user: root
  become_method: sudo
  ansible.builtin.user:
    append: yes
    groups: docker
    name: "{{ ansible_user }}"

- name: Install docker pip dependency
  tags: config
  ansible.builtin.command:
    cmd: pip install docker
